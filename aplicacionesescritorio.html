<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplicaciones de Escritorio — GameVault</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-pattern"></div>
<div class="bg-glow" style="background:rgba(245,158,11,0.1)"></div>
<div id="navContainer"></div>
<div id="searchOverlayContainer"></div>
<div id="gameModal" class="modal-overlay" onclick="if(event.target===this)closeModal()"></div>

<main class="main">
  <div class="page-header">
    <div class="page-header-top">
      <div>
        <div class="page-title">💻 Aplicaciones <span>Escritorio</span></div>
        <div class="page-sub">Software esencial para Windows, macOS y Linux</div>
      </div>
      <div class="page-stats">
        <div class="stat-pill"><span class="dot"></span> <span id="totalCount">0</span> Apps</div>
        <div class="stat-pill">💻 Win · Mac · Linux</div>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Categoría:</span>
    <button class="filter-btn active" data-cat="all" onclick="applyFilter(this,'all')">Todas</button>
    <button class="filter-btn" data-cat="Gaming" onclick="applyFilter(this,'Gaming')">🎮 Gaming</button>
    <button class="filter-btn" data-cat="Comunicación" onclick="applyFilter(this,'Comunicación')">💬 Comunicación</button>
    <button class="filter-btn" data-cat="Streaming" onclick="applyFilter(this,'Streaming')">📡 Streaming</button>
    <button class="filter-btn" data-cat="Multimedia" onclick="applyFilter(this,'Multimedia')">🎬 Multimedia</button>
    <button class="filter-btn" data-cat="Programación" onclick="applyFilter(this,'Programación')">💾 Programación</button>
    <button class="filter-btn" data-cat="Tienda" onclick="applyFilter(this,'Tienda')">🏪 Tiendas</button>
    <div class="filter-sort">
      <span class="filter-label">Ordenar:</span>
      <select class="sort-select" id="sortSelect" onchange="renderApps()">
        <option value="rating">⭐ Mejor valoradas</option>
        <option value="dl">⬇ Más descargadas</option>
        <option value="date">🆕 Más recientes</option>
        <option value="name">🔡 A-Z</option>
      </select>
    </div>
  </div>

  <div class="section-title">💻 Aplicaciones de Escritorio <span class="count" id="appCount"></span></div>
  <div class="games-grid" id="appsGrid"></div>
</main>

<footer>
  <div>© 2026 <strong>GameVault</strong> — Tu portal definitivo de descargas · Todos los derechos reservados</div>
</footer>

<script src="app.js"></script>
<script src="data-pc.js"></script>
<script src="data-celulares.js"></script>
<script src="data-consolas.js"></script>
<script src="data-apps.js"></script>
<script>
const ALL_GAMES = [...PC_GAMES, ...MOBILE_GAMES, ...CONSOLE_GAMES, ...MOBILE_APPS, ...DESKTOP_APPS];
let currentCat = 'all';

document.getElementById('navContainer').innerHTML = navHTML('aplicacionesescritorio.html');
document.getElementById('searchOverlayContainer').innerHTML = `
<div id="searchOverlay" class="search-overlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal">
    <div class="search-big-wrap">
      <input id="searchBigInput" class="search-big" placeholder="Buscar apps de escritorio…" oninput="handleSearch(this.value,ALL_GAMES)">
      <span class="search-close" onclick="closeSearch()">✕</span>
    </div>
    <div class="search-hint">
      <span class="hint-tag" onclick="document.getElementById('searchBigInput').value='Steam';handleSearch('Steam',ALL_GAMES)">Steam</span>
      <span class="hint-tag" onclick="document.getElementById('searchBigInput').value='Discord';handleSearch('Discord',ALL_GAMES)">Discord</span>
      <span class="hint-tag" onclick="document.getElementById('searchBigInput').value='OBS';handleSearch('OBS',ALL_GAMES)">OBS Studio</span>
    </div>
    <div id="searchResultsBox" class="search-results-box"></div>
  </div>
</div>`;

document.getElementById('totalCount').textContent = DESKTOP_APPS.length;

function renderApps() {
  const sortMethod = document.getElementById('sortSelect').value;
  let apps = filterGames(DESKTOP_APPS, currentCat === 'all' ? '' : currentCat, '');
  apps = sortGames(apps, sortMethod);
  document.getElementById('appCount').textContent = `(${apps.length})`;
  if (!apps.length) {
    document.getElementById('appsGrid').innerHTML = `<div class="no-results"><div class="big">😔</div><h3>No se encontraron apps</h3></div>`;
    return;
  }
  document.getElementById('appsGrid').innerHTML = apps.map((g,i) => renderCard(g,i*40)).join('');
}

function applyFilter(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentCat = cat; renderApps();
}

renderApps();
</script>
</body>
</html>
